<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>栀雀系统</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: #e8f5e9;
  text-align: center;
}

h1 {
  padding-top: 40px;
}

.container {
  margin: 40px auto;
  width: 90%;
  max-width: 600px;
}

.member-btn {
  display: block;
  margin: 10px auto;
  padding: 12px;
  border: none;
  border-radius: 20px;
  font-size: 16px;
  cursor: pointer;
  width: 80%;
  color: white;
}

#panel {
  margin-top: 30px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>栀雀系统 🌲</h1>

<div class="container">
  <button class="member-btn" style="background:#66bb6a" onclick="selectMember('A','#66bb6a')">成员A</button>
  <button class="member-btn" style="background:#42a5f5" onclick="selectMember('B','#42a5f5')">成员B</button>
  <button class="member-btn" style="background:#ab47bc" onclick="selectMember('C','#ab47bc')">成员C</button>
</div>

<div id="panel" style="display:none;">
  <h2 id="memberName"></h2>
  <p id="stats"></p>
  <button onclick="checkIn()">今日打卡</button>
</div>

<script>

let currentMember = "";
let currentColor = "";

function selectMember(name,color){
  currentMember = name;
  currentColor = color;
  document.getElementById("panel").style.display = "block";
  document.getElementById("panel").style.border = "2px solid " + color;
  document.getElementById("memberName").innerText = "成员 " + name;
  updateStats();
}

function checkIn(){
  let today = new Date().toISOString().split("T")[0];
  let key = "checkin_" + currentMember;
  let data = JSON.parse(localStorage.getItem(key)) || [];

  if(!data.includes(today)){
    data.push(today);
    localStorage.setItem(key, JSON.stringify(data));
    alert("打卡成功");
  } else {
    alert("今天已经打过卡了");
  }

  updateStats();
}

function updateStats(){
  let key = "checkin_" + currentMember;
  let data = JSON.parse(localStorage.getItem(key)) || [];
  document.getElementById("stats").innerText =
    "累计打卡：" + data.length + " 天";
}

// 简易排班
const schedule = {
  1: "A",
  2: "B",
  3: "C",
  4: "A",
  5: "B",
  6: "C",
  0: "A"
};

let today = new Date().getDay();
let duty = schedule[today];
document.write("<p>今日值守成员：" + duty + "</p>");

</script>

</body>
</html>
